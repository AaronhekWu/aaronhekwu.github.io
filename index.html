<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NVC - 非暴力沟通训练系统</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

    :root {
      --blue-50: #eff6ff;
      --blue-100: #dbeafe;
      --blue-200: #bfdbfe;
      --blue-300: #93c5fd;
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --blue-800: #1e40af;
      --blue-900: #1e3a8a;
      --cyan-400: #22d3ee;
      --indigo-500: #6366f1;
      --success: #10b981;
      --success-light: #d1fae5;
      --danger: #ef4444;
      --danger-light: #fee2e2;
      --bg: #f0f4ff;
      --card: #ffffff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.2);
      --glass: rgba(255, 255, 255, 0.7);
      --shadow-sm: 0 1px 3px rgba(30, 58, 138, 0.06);
      --shadow-md: 0 4px 24px rgba(30, 58, 138, 0.1);
      --shadow-lg: 0 12px 48px rgba(30, 58, 138, 0.12);
      --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.15);
      --radius: 20px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --gradient-main: linear-gradient(135deg, var(--blue-600) 0%, var(--indigo-500) 50%, var(--cyan-400) 100%);
      --gradient-subtle: linear-gradient(135deg, var(--blue-50) 0%, #f0f0ff 50%, #ecfeff 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      z-index: 0;
      animation: blobFloat 20s ease-in-out infinite alternate;
    }

    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--blue-300), transparent 70%);
      top: -100px; left: -100px;
    }

    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, var(--cyan-400), transparent 70%);
      bottom: -50px; right: -80px;
      animation-delay: -10s;
      animation-direction: alternate-reverse;
    }

    @keyframes blobFloat {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
      100% { transform: translate(30px, -10px) scale(1.02); }
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg), var(--shadow-glow);
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
      z-index: 1;
      backdrop-filter: blur(20px);
      animation: containerIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes containerIn {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ==================== Header ==================== */
    .header {
      padding: 32px 36px 28px;
      text-align: center;
      background: var(--gradient-main);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      animation: patternDrift 30s linear infinite;
    }

    @keyframes patternDrift {
      from { transform: translateX(0); }
      to { transform: translateX(60px); }
    }

    /* Shimmer effect across header */
    .header::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      animation: shimmer 4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { left: -100%; }
      50% { left: 100%; }
    }

    .header-brand {
      font-family: 'Noto Serif SC', serif;
      font-size: 26px;
      font-weight: 700;
      color: white;
      letter-spacing: 3px;
      margin-bottom: 8px;
      position: relative;
      text-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .header-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      font-weight: 300;
      letter-spacing: 6px;
      position: relative;
    }

    .header-actions {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      position: relative;
    }

    .header-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 7px 18px;
      border-radius: 24px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      font-family: inherit;
      backdrop-filter: blur(8px);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .header-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    .header-btn.active {
      background: white;
      color: var(--blue-700);
      border-color: white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    .api-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      margin-top: 14px;
      position: relative;
      font-weight: 400;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      position: relative;
    }

    .status-dot.online {
      background: #34d399;
      box-shadow: 0 0 8px rgba(52, 211, 153, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.offline { background: #f87171; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
    }

    /* ==================== Config Panel ==================== */
    .config-panel {
      padding: 0;
      max-height: 0;
      overflow: hidden;
      background: var(--gradient-subtle);
      border-bottom: 0 solid var(--border);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .config-panel.show {
      padding: 24px 36px;
      max-height: 200px;
      border-bottom-width: 1px;
    }

    .config-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .config-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .config-field select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--blue-200);
      border-radius: var(--radius-xs);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: white;
      transition: all 0.3s;
      color: var(--text);
      cursor: pointer;
    }

    .config-field select:focus {
      border-color: var(--blue-500);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .config-note {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.6;
      padding: 10px 14px;
      background: rgba(59, 130, 246, 0.05);
      border-radius: var(--radius-xs);
      border-left: 3px solid var(--blue-300);
    }

    /* ==================== Scenario Card ==================== */
    .scenario-card {
      padding: 24px 36px;
      border-bottom: 1px solid var(--border);
      background: white;
      position: relative;
      overflow: hidden;
      animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .scenario-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      background: var(--gradient-main);
      border-radius: 0 4px 4px 0;
    }

    .scenario-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--blue-600);
      letter-spacing: 2px;
      margin-bottom: 10px;
      padding: 4px 12px;
      background: var(--blue-50);
      border-radius: 20px;
    }

    .scenario-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .scenario-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.9;
      font-weight: 300;
    }

    .scenario-meta {
      display: flex;
      gap: 20px;
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .scenario-meta span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: var(--blue-50);
      border-radius: 20px;
      transition: all 0.3s;
    }

    .scenario-meta span:hover {
      background: var(--blue-100);
      color: var(--blue-700);
    }

    /* ==================== Steps Progress ==================== */
    .steps-bar {
      display: flex;
      padding: 20px 36px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: var(--gradient-subtle);
      align-items: center;
    }

    .step-item {
      flex: 1;
      text-align: center;
      padding: 14px 8px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      background: white;
      color: var(--text-muted);
      position: relative;
      border: 1px solid var(--border);
      cursor: default;
    }

    .step-item .step-num {
      font-size: 22px;
      font-weight: 700;
      display: block;
      font-family: 'Noto Serif SC', serif;
      line-height: 1.2;
    }

    .step-item .step-label {
      display: block;
      margin-top: 4px;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .step-item .step-rule {
      display: block;
      margin-top: 3px;
      font-weight: 300;
      font-size: 10px;
      opacity: 0.7;
      letter-spacing: 0.5px;
    }

    .step-item.active {
      background: var(--gradient-main);
      color: white;
      border-color: transparent;
      box-shadow: 0 6px 24px rgba(59, 130, 246, 0.35);
      transform: translateY(-2px) scale(1.02);
    }

    .step-item.active .step-rule { opacity: 1; }

    .step-item.done {
      background: linear-gradient(135deg, #059669, #10b981);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
    }

    .step-connector {
      display: flex;
      align-items: center;
      color: var(--blue-300);
      font-size: 14px;
      font-weight: 300;
      flex-shrink: 0;
    }

    /* ==================== Chat Area ==================== */
    .chat-area {
      height: 420px;
      overflow-y: auto;
      padding: 28px 36px;
      background: linear-gradient(180deg, var(--blue-50) 0%, #f8faff 50%, white 100%);
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--blue-200); border-radius: 10px; }
    .chat-area::-webkit-scrollbar-thumb:hover { background: var(--blue-300); }

    .message {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      animation: msgIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      background: white;
      box-shadow: var(--shadow-sm);
      border: 2px solid var(--blue-100);
      transition: transform 0.3s;
    }

    .message:hover .avatar { transform: scale(1.05); }

    .bubble {
      max-width: 72%;
      padding: 14px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.85;
      transition: box-shadow 0.3s;
    }

    .message:not(.user) .bubble {
      background: white;
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }

    .message:not(.user) .bubble:hover { box-shadow: var(--shadow-md); }

    .message.user .bubble {
      background: var(--gradient-main);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.25);
    }

    /* ==================== Feedback ==================== */
    .feedback-bubble {
      max-width: 85%;
      margin: -12px 0 20px 54px;
      animation: feedbackIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes feedbackIn {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .feedback-pass {
      background: var(--success-light);
      border: 1px solid #a7f3d0;
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      font-size: 13px;
      color: #065f46;
      line-height: 1.8;
      position: relative;
      overflow: hidden;
    }

    .feedback-pass::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      background: var(--success);
      border-radius: 4px 0 0 4px;
    }

    .feedback-fail {
      background: var(--danger-light);
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      font-size: 13px;
      color: #991b1b;
      line-height: 1.8;
      position: relative;
      overflow: hidden;
    }

    .feedback-fail::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      background: var(--danger);
      border-radius: 4px 0 0 4px;
    }

    .feedback-bubble .label {
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .emotion-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      margin-top: 10px;
      background: white;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      transition: all 0.3s;
    }

    .emotion-tag:hover { border-color: var(--blue-300); }

    /* ==================== Input Area ==================== */
    .input-area {
      padding: 20px 36px;
      border-top: 1px solid var(--border);
      background: white;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      border: 2px solid var(--blue-100);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 14px;
      resize: none;
      outline: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      font-family: inherit;
      line-height: 1.6;
      min-height: 50px;
      max-height: 120px;
      background: var(--blue-50);
      color: var(--text);
    }

    .input-area textarea:focus {
      border-color: var(--blue-400);
      background: white;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
    }

    .input-area textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      background: var(--gradient-main);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 13px 26px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      font-family: inherit;
      white-space: nowrap;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }

    .send-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .send-btn:hover::after { transform: translateX(100%); }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
    }

    .send-btn:active { transform: translateY(0); }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ==================== Loading ==================== */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 36px;
      text-align: center;
      background: linear-gradient(180deg, var(--blue-50) 0%, white 100%);
      min-height: 360px;
    }

    .loading-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--blue-100);
      border-top-color: var(--blue-500);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 15px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .loading-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      font-weight: 300;
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    /* ==================== Completion ==================== */
    .completion-banner {
      text-align: center;
      padding: 48px 36px;
      animation: completionIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes completionIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .completion-icon {
      width: 80px;
      height: 80px;
      background: var(--gradient-main);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .completion-banner h2 {
      font-family: 'Noto Serif SC', serif;
      font-size: 24px;
      color: var(--text);
      margin-bottom: 14px;
      font-weight: 700;
    }

    .completion-banner p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 2;
      font-weight: 300;
    }

    .completion-banner strong {
      color: var(--blue-600);
      font-weight: 600;
    }

    .restart-btn {
      margin-top: 24px;
      background: var(--gradient-main);
      color: white;
      border: none;
      border-radius: 28px;
      padding: 14px 40px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      font-family: inherit;
      letter-spacing: 1px;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.25);
    }

    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(59, 130, 246, 0.35);
    }

    /* ==================== Demo Banner ==================== */
    .demo-banner {
      background: linear-gradient(135deg, #eff6ff, #ecfeff);
      border: 1px solid var(--blue-200);
      border-radius: var(--radius-sm);
      padding: 14px 20px;
      margin: 16px 36px;
      font-size: 12px;
      color: var(--blue-800);
      text-align: center;
      line-height: 1.8;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ==================== Responsive ==================== */
    @media (max-width: 600px) {
      body { padding: 0; }
      .container { border-radius: 0; border: none; min-height: 100vh; box-shadow: none; }
      .header { padding: 24px 20px 20px; }
      .header-brand { font-size: 22px; letter-spacing: 2px; }
      .scenario-card, .input-area, .chat-area, .steps-bar { padding-left: 16px; padding-right: 16px; }
      .scenario-card::before { display: none; }
      .config-panel.show { padding: 20px 16px; }

    async function loadConfig() {
      try {
        const resp = await fetch('config.json');
        configData = await resp.json();
      } catch (e) {
        console.warn('Config load failed, using defaults');
        configData = {
          api: {
            baseUrl: '',
            endpoints: { verify: '', chat: 'https://fc-mp-1ff77b60-d1e4-4cf7-b8d1-9843fece77c8.next.bspapp.com/chat' },
            provider: 'qwen'
          },
          providers: {}
        };

      configData.api = configData.api || {};
      configData.api.endpoints = configData.api.endpoints || { verify: '', chat: '/chat' };
      const saved = localStorage.getItem('nvc_provider');
      if (saved) configData.api.provider = saved;
    }

    function buildApiUrl(endpointKey) {
      const endpoint = configData?.api?.endpoints?.[endpointKey] || '';
      const baseUrl = (configData?.api?.baseUrl || '').trim().replace(/\/$/, '');
      if (!endpoint) return '';
      if (/^https?:\/\//i.test(endpoint)) return endpoint;
      const normalizedEndpoint = endpoint.startsWith('/') ? endpoint : `/${endpoint}`;
      return baseUrl ? `${baseUrl}${normalizedEndpoint}` : `/api${normalizedEndpoint}`;
    }

    async function verifyProviders() {
      let verifyDetails = {};
      const verifyUrl = buildApiUrl('verify');
      if (!verifyUrl) {
        // 仅配置 /chat 时，默认放开 config.json 里声明的 provider
        availableProviders = Object.fromEntries(Object.keys(configData.providers || {}).map((k) => [k, true]));
      } else {
        try {
          const resp = await fetch(verifyUrl);
          const data = await resp.json();
          availableProviders = data.providers || {};
          verifyDetails = data.details || {};
        } catch (e) {
          console.error('Verify endpoint unreachable:', e);
          availableProviders = Object.fromEntries(Object.keys(configData.providers || {}).map((k) => [k, true]));
        }
      }
      const select = document.getElementById('apiProvider');
      select.innerHTML = '';
      const preferred = configData.api.provider;
      let hasAvailable = false;
      for (const [key, online] of Object.entries(availableProviders)) {
        if (!online) continue;
        hasAvailable = true;
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = PROVIDER_NAMES[key] || key;
        if (key === preferred) opt.selected = true;
        select.appendChild(opt);
      }
      if (hasAvailable) {
        activeProvider = select.value;
        updateAPIStatus(true);
      } else {
        select.innerHTML = '<option value="">无可用服务</option>';
        activeProvider = null;
        updateAPIStatus(false);
        console.warn('No API providers available. Details:', verifyDetails);
        console.warn('请检查云函数 /chat 触发器与环境变量配置');
      }
    }

    function switchProvider() {
      const val = document.getElementById('apiProvider').value;
      if (val && availableProviders[val]) {
        activeProvider = val;
        configData.api.provider = val;
        localStorage.setItem('nvc_provider', val);
        updateAPIStatus(true);
      }
    }

    function toggleConfig() {

    function getActiveModel() {
      if (!activeProvider || !configData.providers[activeProvider]) return null;
      return configData.providers[activeProvider].model;
    }

    async function proxyCall(messages, temperature = 0.7, maxTokens = 8000) {
      const model = getActiveModel();
      if (!activeProvider || !model) {
        console.error('proxyCall failed: no active provider or model', { activeProvider, model, configProviders: configData?.providers });
        return null;
      }
      const resp = await fetch(buildApiUrl('chat'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          provider: activeProvider,
          model: model,
          messages: messages,
          temperature: temperature,
          max_tokens: maxTokens
        })
      });
      if (!resp.ok) {
        const errBody = await resp.text().catch(() => '');
        console.error(`API proxy error [${resp.status}]:`, errBody);
        throw new Error(`Proxy error ${resp.status}: ${errBody.substring(0, 200)}`);
      }
      return await resp.json();
    }

    function buildDialogSystemPrompt(scene) {
      const c = scene.character;
      const s = scene.scenario;

      return `你是"${c.name}"，${c.identity}，${c.age}岁。${s.description}

你当前的情绪：${c.emotion_state}

## 核心任务
这是一个"非暴力沟通四步法"教学训练系统。学生需要依次完成4轮对话：
- 第1轮：观察（客观描述事实，不评判、不贴标签）
- 第2轮：感受（表达真实情绪，不指责）
- 第3轮：需要（说出核心需求，不隐藏、不强加）
- 第4轮：请求（提出具体、可执行的行动请求，非命令）

## 判定标准

**第1轮-观察（不评判）：**
- 合格：描述具体的、可观察的事实（时间、地点、行为、频次），不含评判性词语
- 不合格：包含评判、贴标签、主观定性的词语

**第2轮-感受（不指责）：**
- 合格：用"我"开头表达情绪，可以共情对方，不含指责句式
- 不合格：用"你让我""你害得我"等指责性句式

**第3轮-需要（不隐藏）：**
- 合格：明确说出核心需求，不用比较、不强加、不含糊
- 不合格：拿他人比较、需求模糊不具体

**第4轮-请求（可执行）：**
- 合格：具体的、可操作的、可协商的行动方案，有细节，语气是邀请非命令
- 不合格：命令式语气、笼统的要求

## 回复格式（严格JSON）
{"pass":true或false,"current_step":1-4,"feedback":"专业点评50字内","response":"${c.name}的角色回应100字内","emotion":"happy/sad/angry/defensive/touched/relieved六选一","hint":"不通过时给修改提示，通过则空字符串"}

## 角色情绪变化
- 第1轮：防备冷漠。合格→稍放下防备；不合格→更抗拒
- 第2轮：合格→有些触动；不合格→沉默反驳
- 第3轮：合格→感到被理解；不合格→抵触
- 第4轮：合格→愿意尝试；不合格→拒绝

## 重要规则
1. 每轮只判定当前步骤，不跳步
2. 不通过可重试，通过才进入下一轮
3. 通过时回应要体现情绪变化
4. 角色回应要真实自然，符合${c.name}的性格
5. 回复必须是纯JSON，不要有其他内容`;
    }

    async function generateScenarioFromAPI() {
      try {
        const data = await proxyCall(
          [{ role: 'user', content: buildScenarioGenerationPrompt() }],
          0.9, 1200
        );
        const content = data.choices[0].message.content;
        const jsonMatch = content.match(/\{[\s\S]*\}/);
        if (jsonMatch) return JSON.parse(jsonMatch[0]);
        throw new Error('Invalid JSON');
      } catch (e) {
        console.error('Scenario generation failed:', e);
        return null;
      }
    }

    function localJudge(text, step) {
      const kw = scenarioData.judgment_keywords;
      const er = scenarioData.emotion_responses;
      let pass = true;
      let feedback = '';
      let hint = '';
      let emotion = '';
      let response = '';

      if (step === 1) {
        const found = kw.step1_bad_words.find(w => text.includes(w));
        if (found || text.length < 10) {
          pass = false;
          feedback = found ? `"${found}"是评判性词语，不是客观事实描述。` : '描述太简短，请具体说明时间、地点、行为等事实。';
          hint = '试试描述具体的可观察事实，例如时间、次数、行为。';
          emotion = er.step1_fail.emotion;
          response = er.step1_fail.response;
        } else {
          feedback = '很好！你客观描述了事实，没有带评判。';
          emotion = er.step1_pass.emotion;
          response = er.step1_pass.response;
        }
      } else if (step === 2) {
        const found = kw.step2_bad_words.find(w => text.includes(w));
        const hasFeeling = kw.step2_good_words.some(w => text.includes(w));
        if (found) {
          pass = false;
          feedback = `"${found}"是在指责对方，不是表达自己的感受。`;
          hint = '试试用"我感到担心/心疼/难过"来表达。';
          emotion = er.step2_fail.emotion;
          response = er.step2_fail.response;
        } else if (!hasFeeling) {
          pass = false;
          feedback = '没有明确表达你的情绪感受。';
          hint = '请用"我"开头，说出你真实的情绪。';
          emotion = er.step2_fail.emotion;
          response = er.step2_fail.response;
        } else {
          feedback = '真诚地表达了感受，很棒！';
          emotion = er.step2_pass.emotion;
          response = er.step2_pass.response;
        }
      } else if (step === 3) {
        const found = kw.step3_bad_words.find(w => text.includes(w));
        const hasNeed = kw.step3_good_words.some(w => text.includes(w));
        if (found) {
          pass = false;
          feedback = `"${found}"是在比较或含糊表达，不是明确的需求。`;
          hint = '试试说出具体需求，如"我希望你能被尊重""我希望你平安"。';
          emotion = er.step3_fail.emotion;
          response = er.step3_fail.response;
        } else if (!hasNeed || text.length < 15) {
          pass = false;
          feedback = '需求表达不够明确或太简短。';
          hint = '请说出你内心真正在乎的是什么。';
          emotion = er.step3_fail.emotion;
          response = er.step3_fail.response;
        } else {
          feedback = '说出了真实的核心需求，非常好！';
          emotion = er.step3_pass.emotion;
          response = er.step3_pass.response;
        }
      } else if (step === 4) {
        const found = kw.step4_bad_words.find(w => text.includes(w));
        const hasSpecific = kw.step4_good_words.some(w => text.includes(w));
        if (found) {
          pass = false;
          feedback = `"${found}"是命令式语气，不是可协商的请求。`;
          hint = '试试用"你能不能……""我们一起商量……好吗？"的句式。';
          emotion = er.step4_fail.emotion;
          response = er.step4_fail.response;
        } else if (!hasSpecific) {
          pass = false;
          feedback = '请求不够具体或缺少协商语气。';
          hint = '加上具体方案和"好吗？""你觉得呢？"等协商语气。';
          emotion = er.step4_fail.emotion;
          response = er.step4_fail.response;
        } else {
          feedback = '提出了具体、可执行且可协商的请求，完美！';
          emotion = er.step4_pass.emotion;
          response = er.step4_pass.response;
        }
      }

      return { pass, current_step: step, feedback, response, emotion, hint };
    }

    // ========================
    // API Call for Dialog
    // ========================
    async function callAPI(userText) {
      if (!apiMode) {
        return localJudge(userText, currentStep);
      }

      conversationHistory.push({
        role: 'user',
        content: `[当前是第${currentStep}轮-${stepNames[currentStep]}（${stepRules[currentStep]}）]\n学生输入：${userText}`
      });

      const messages = [
        { role: 'system', content: buildDialogSystemPrompt(scenarioData) },
        ...conversationHistory
      ];

      try {
        const data = await proxyCall(messages, 0.7, 500);
        const content = data.choices[0].message.content;
        conversationHistory.push({ role: 'assistant', content });
        const jsonMatch = content.match(/\{[\s\S]*\}/);
        if (jsonMatch) return JSON.parse(jsonMatch[0]);
        throw new Error('Invalid JSON');
      } catch (e) {
        console.error('API Error:', e);
        return localJudge(userText, currentStep);
      }
    }

    // ========================
    // UI Helpers
    // ========================
    function addMessage(text, isUser) {
      const chatArea = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : ''}`;
      const avatarEmoji = isUser ? '\u{1F464}' : (scenarioData ? scenarioData.character.avatar_emoji : '\u{1F9D1}');
      div.innerHTML = `
        <div class="avatar">${avatarEmoji}</div>
        <div class="bubble">${text}</div>
      `;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addFeedback(pass, feedback, hint, emotion) {
      const chatArea = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = 'feedback-bubble';
      let html = `<div class="${pass ? 'feedback-pass' : 'feedback-fail'}">`;
      html += `<div class="label">${pass ? '\u2705 通过' : '\u274C 未通过'}</div>`;
      html += `<div>${feedback}</div>`;
      if (!pass && hint) html += `<div style="margin-top:6px;opacity:0.85;">提示：${hint}</div>`;
      if (emotion) html += `<span class="emotion-tag">${emotionEmoji[emotion] || ''} ${scenarioData ? scenarioData.character.name : '对方'}的情绪：${emotionText[emotion] || emotion}</span>`;
      html += '</div>';
      div.innerHTML = html;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addLoading() {
      const chatArea = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = 'message';
      div.id = 'loadingMsg';
      const name = scenarioData ? scenarioData.character.name : '对方';
      const emoji = scenarioData ? scenarioData.character.avatar_emoji : '\u{1F9D1}';
      div.innerHTML = `
        <div class="avatar">${emoji}</div>
        <div class="bubble"><span class="loading-dots">${name}正在思考</span></div>
      `;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeLoading() {
      const el = document.getElementById('loadingMsg');
      if (el) el.remove();
    }

    function updateSteps(step, passed) {
      for (let i = 1; i <= 4; i++) {
        const el = document.getElementById('step' + i);
        el.className = 'step-item';
        if (i < step || (i === step && passed && step <= 4)) el.className += ' done';
        else if (i === step && !passed) el.className += ' active';
        else if (i === step + 1 && passed) el.className += ' active';
      }
    }

    function renderScenario(scene) {
      scenarioData = scene;
      document.getElementById('scenarioTitle').textContent = scene.scenario.title;
      document.getElementById('scenarioDesc').textContent = scene.scenario.description;
      document.getElementById('metaRole').innerHTML = `\u{1F3AD} 你的角色：${scene.player.role}`;
      document.getElementById('metaGoal').innerHTML = `\u{1F3AF} 目标：${scene.player.goal}`;

      const chatArea = document.getElementById('chatArea');
      chatArea.innerHTML = '';
      addMessage(`（${scene.opening.scene_desc}）<br><br>${scene.opening.first_line}`, false);

      document.getElementById('userInput').placeholder = stepPlaceholders[1];
    }

    function showCompletion() {
      const chatArea = document.getElementById('chatArea');
      const name = scenarioData ? scenarioData.character.name : '对方';
      const div = document.createElement('div');
      div.className = 'completion-banner';
      div.innerHTML = `
        <div class="completion-icon">\u{1F3C6}</div>
        <h2>恭喜完成训练</h2>
        <p>你成功运用了非暴力沟通四步法：<br>
        <strong>观察</strong>（不评判）\u2192 <strong>感受</strong>（不指责）\u2192 <strong>需要</strong>（不隐藏）\u2192 <strong>请求</strong>（可执行）<br><br>
        ${name}从最初的防备抗拒，到最后愿意敞开心扉。<br>
        这就是非暴力沟通的力量。</p>
        <button class="restart-btn" onclick="generateNewScenario()">开始新场景</button>
      `;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      document.getElementById('inputArea').style.display = 'none';
    }

    // ========================
    // Core Flow
    // ========================
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      input.disabled = true;

      addMessage(text, true);
      input.value = '';
      addLoading();

      try {
        const result = await callAPI(text);
        removeLoading();
        addFeedback(result.pass, result.feedback, result.hint, result.emotion);
        if (result.response) addMessage(result.response, false);

        if (result.pass) {
          updateSteps(currentStep, true);
          if (currentStep >= 4) {
            showCompletion();
            return;
          }
          currentStep++;
          updateSteps(currentStep, false);
          input.placeholder = stepPlaceholders[currentStep];
        }
      } catch (e) {
        removeLoading();
        addMessage('（系统出错，请重试）', false);
      }

      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
    }

    async function generateNewScenario() {
      currentStep = 1;
      conversationHistory = [];
      updateSteps(1, false);
      document.getElementById('inputArea').style.display = 'flex';

      if (apiMode) {
        document.getElementById('appContent').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'flex';
        document.querySelector('.loading-text').innerHTML = '正在生成新场景<span class="loading-dots"></span>';

        const scene = await generateScenarioFromAPI();
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('appContent').style.display = 'block';

        if (scene) {
          renderScenario(scene);
        } else {
          renderScenario(DEFAULT_SCENARIO);
        }
      } else {
        renderScenario(DEFAULT_SCENARIO);
      }
    }

    // ========================
    // Initialization
    // ========================
    async function init() {
      await loadConfig();
      await verifyProviders();

      if (apiMode) {
        document.querySelector('.loading-text').innerHTML = '正在生成训练场景<span class="loading-dots"></span>';
        const scene = await generateScenarioFromAPI();
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('appContent').style.display = 'block';
        renderScenario(scene || DEFAULT_SCENARIO);
      } else {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('appContent').style.display = 'block';
        renderScenario(DEFAULT_SCENARIO);
      }
    }

    init();
  </script>
</body>
</html>
